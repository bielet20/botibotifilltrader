<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - AAA BOT TRADING</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #131c32;
            --border: rgba(255, 255, 255, 0.14);
            --text: #f2f5ff;
            --muted: #9fb0d3;
            --accent: #5ea0ff;
            --danger: #ff6b6b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #17264d 0%, var(--bg) 52%, #070b15 100%);
        }
        .card {
            width: min(430px, calc(100vw - 28px));
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.38);
        }
        h1 { margin: 0 0 8px; font-size: 1.15rem; }
        p { margin: 0 0 16px; color: var(--muted); font-size: 0.88rem; line-height: 1.45; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: var(--muted); }
        input {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            padding: 11px 12px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            padding: 11px 14px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.65; cursor: default; }
        .status {
            margin-top: 12px;
            font-size: 0.82rem;
            min-height: 1.2rem;
            color: var(--muted);
        }
        .status.error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Acceso protegido</h1>
        <p>Introduce tus credenciales para acceder al panel de trading.</p>
        <form id="loginForm">
            <label for="username">Usuario</label>
            <input id="username" name="username" autocomplete="username" required />
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <div id="totpWrap" style="display:none;">
                <label for="totpCode">Código 2FA (TOTP)</label>
                <input id="totpCode" name="totpCode" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" />
            </div>
            <button id="submitBtn" type="submit">Entrar</button>
            <div id="status" class="status"></div>
        </form>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('status');
        const totpWrap = document.getElementById('totpWrap');
        const totpInput = document.getElementById('totpCode');
        let requiresTotp = false;
        const setStatus = (msg, isError = false) => {
            statusBox.textContent = msg || '';
            statusBox.className = `status${isError ? ' error' : ''}`;
        };

        async function checkAlreadyLogged() {
            try {
                const res = await fetch('/api/auth/status');
                if (!res.ok) return;
                const data = await res.json();
                if (data && data.auth_enabled && data.authenticated) {
                    window.location.href = '/';
                    return;
                }
                requiresTotp = !!(data && data.requires_totp);
                if (totpWrap) {
                    totpWrap.style.display = requiresTotp ? 'block' : 'none';
                }
            } catch (_e) {}
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setStatus('');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Validando...';
            const payload = {
                username: document.getElementById('username').value || '',
                password: document.getElementById('password').value || '',
            };
            if (requiresTotp) {
                payload.totp_code = (totpInput?.value || '').trim();
            }
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Credenciales inválidas');
                }
                const data = await res.json().catch(() => ({}));
                requiresTotp = !!data?.requires_totp;
                window.location.href = '/';
            } catch (err) {
                setStatus(`Error: ${err.message || 'No se pudo autenticar'}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        checkAlreadyLogged();
    </script>
</body>
</html>

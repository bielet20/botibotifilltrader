<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - AAA BOT TRADING</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #131c32;
            --border: rgba(255, 255, 255, 0.14);
            --text: #f2f5ff;
            --muted: #9fb0d3;
            --accent: #5ea0ff;
            --danger: #ff6b6b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #17264d 0%, var(--bg) 52%, #070b15 100%);
        }
        .card {
            width: min(430px, calc(100vw - 28px));
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.38);
        }
        h1 { margin: 0 0 8px; font-size: 1.15rem; }
        p { margin: 0 0 16px; color: var(--muted); font-size: 0.88rem; line-height: 1.45; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: var(--muted); }
        input {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            padding: 11px 12px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            padding: 11px 14px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.65; cursor: default; }
        .status {
            margin-top: 12px;
            font-size: 0.82rem;
            min-height: 1.2rem;
            color: var(--muted);
        }
        .status.error { color: var(--danger); }
        .link-btn {
            margin-top: 10px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 10px;
            padding: 9px 12px;
            cursor: pointer;
        }
        .small { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Acceso protegido</h1>
        <p>Introduce tus credenciales para acceder al panel de trading.</p>
        <form id="loginForm">
            <label for="username">Usuario</label>
            <input id="username" name="username" autocomplete="username" required />
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <div id="totpWrap" style="display:none;">
                <label for="totpCode">Código 2FA (TOTP)</label>
                <input id="totpCode" name="totpCode" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" />
            </div>
            <button id="submitBtn" type="submit">Entrar</button>
            <button id="forgotBtn" type="button" class="link-btn">Olvidé mi contraseña</button>
            <div id="status" class="status"></div>
        </form>
        <form id="resetRequestForm" style="display:none; margin-top:12px;">
            <label for="recoveryEmail">Email de recuperación</label>
            <input id="recoveryEmail" type="email" placeholder="admin@tu-dominio.com" />
            <button id="sendResetBtn" type="submit">Enviar email de renovación</button>
            <div class="small">Se enviará un enlace/token de validez limitada.</div>
        </form>
        <form id="resetConfirmForm" style="display:none; margin-top:12px;">
            <label for="resetToken">Token</label>
            <input id="resetToken" placeholder="Pega aquí el token" />
            <label for="newPassword">Nueva contraseña</label>
            <input id="newPassword" type="password" />
            <label for="newPassword2">Confirmar nueva contraseña</label>
            <input id="newPassword2" type="password" />
            <button id="confirmResetBtn" type="submit">Actualizar contraseña</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const forgotBtn = document.getElementById('forgotBtn');
        const statusBox = document.getElementById('status');
        const totpWrap = document.getElementById('totpWrap');
        const totpInput = document.getElementById('totpCode');
        const resetRequestForm = document.getElementById('resetRequestForm');
        const resetConfirmForm = document.getElementById('resetConfirmForm');
        let requiresTotp = false;
        const setStatus = (msg, isError = false) => {
            statusBox.textContent = msg || '';
            statusBox.className = `status${isError ? ' error' : ''}`;
        };

        async function checkAlreadyLogged() {
            try {
                const res = await fetch('/api/auth/status');
                if (!res.ok) return;
                const data = await res.json();
                if (data && data.auth_enabled && data.authenticated) {
                    window.location.href = '/';
                    return;
                }
                requiresTotp = !!(data && data.requires_totp);
                if (totpWrap) {
                    totpWrap.style.display = requiresTotp ? 'block' : 'none';
                }
            } catch (_e) {}
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            setStatus('');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Validando...';
            const payload = {
                username: document.getElementById('username').value || '',
                password: document.getElementById('password').value || '',
            };
            if (requiresTotp) {
                payload.totp_code = (totpInput?.value || '').trim();
            }
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Credenciales inválidas');
                }
                const data = await res.json().catch(() => ({}));
                requiresTotp = !!data?.requires_totp;
                window.location.href = '/';
            } catch (err) {
                setStatus(`Error: ${err.message || 'No se pudo autenticar'}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        if (forgotBtn) {
            forgotBtn.addEventListener('click', () => {
                resetRequestForm.style.display = resetRequestForm.style.display === 'none' ? 'block' : 'none';
            });
        }

        if (resetRequestForm) {
            resetRequestForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = (document.getElementById('recoveryEmail').value || '').trim();
                try {
                    const res = await fetch('/api/auth/password-reset/request', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, base_url: window.location.origin }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    setStatus('Si el email coincide, se enviaron instrucciones.');
                } catch (err) {
                    setStatus(`Error: ${err.message || 'No se pudo enviar'}`, true);
                }
            });
        }

        const url = new URL(window.location.href);
        const qsToken = (url.searchParams.get('reset_token') || '').trim();
        if (qsToken && resetConfirmForm) {
            resetConfirmForm.style.display = 'block';
            const tokenInput = document.getElementById('resetToken');
            if (tokenInput) tokenInput.value = qsToken;
        }

        if (resetConfirmForm) {
            resetConfirmForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const token = (document.getElementById('resetToken').value || '').trim();
                const newPassword = document.getElementById('newPassword').value || '';
                const confirmPassword = document.getElementById('newPassword2').value || '';
                try {
                    const res = await fetch('/api/auth/password-reset/confirm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token,
                            new_password: newPassword,
                            confirm_password: confirmPassword,
                        }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    setStatus('Contraseña actualizada. Ya puedes iniciar sesión.');
                    resetConfirmForm.style.display = 'none';
                } catch (err) {
                    setStatus(`Error: ${err.message || 'No se pudo actualizar'}`, true);
                }
            });
        }

        checkAlreadyLogged();
    </script>
</body>
</html>

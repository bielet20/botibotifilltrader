services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYDANTIC_DISABLE_PLUGINS: "__all__"
      PORT: "8000"
      WEB_CONCURRENCY: "2"
      # For Coolify, prefer managed Postgres/Redis URLs in env vars.
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/trading_runtime.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Capital-autonomous profile (paper-first + strict promotion to real)
      ENTRY_PROFIT_MODE: ${ENTRY_PROFIT_MODE:-true}
      REQUIRE_PAPER_VALIDATION_FOR_LIVE_MAINNET: ${REQUIRE_PAPER_VALIDATION_FOR_LIVE_MAINNET:-true}
      AUTO_REAL_PRODUCTION_FROM_PAPER: ${AUTO_REAL_PRODUCTION_FROM_PAPER:-true}
      PRODUCTION_AUTO_PROMOTE_ENABLED: ${PRODUCTION_AUTO_PROMOTE_ENABLED:-true}
      PRODUCTION_AUTO_PROMOTE_PAPER_EXECUTOR_ONLY: ${PRODUCTION_AUTO_PROMOTE_PAPER_EXECUTOR_ONLY:-true}
      PRODUCTION_AUTO_PROMOTE_REQUIRE_ORCHESTRATOR: ${PRODUCTION_AUTO_PROMOTE_REQUIRE_ORCHESTRATOR:-false}
      PRODUCTION_AUTO_PROMOTE_MIN_SCORED_TRADES: ${PRODUCTION_AUTO_PROMOTE_MIN_SCORED_TRADES:-6}
      AUTONOMY_WATCHDOG_ENABLED: ${AUTONOMY_WATCHDOG_ENABLED:-true}
      AUTONOMY_WATCHDOG_INTERVAL_SEC: ${AUTONOMY_WATCHDOG_INTERVAL_SEC:-60}
      AUTONOMY_WATCHDOG_SYNC_POSITIONS: ${AUTONOMY_WATCHDOG_SYNC_POSITIONS:-true}
      AUTONOMY_WATCHDOG_REASSIGN_POSITIONS: ${AUTONOMY_WATCHDOG_REASSIGN_POSITIONS:-true}
      CAPITAL_AUTONOMY_ENABLED: ${CAPITAL_AUTONOMY_ENABLED:-true}
      CAPITAL_AUTONOMY_MAX_ACTIVE: ${CAPITAL_AUTONOMY_MAX_ACTIVE:-2}
      CAPITAL_AUTONOMY_BASE_ALLOCATION: ${CAPITAL_AUTONOMY_BASE_ALLOCATION:-120}
      CAPITAL_AUTONOMY_ONLY_PAPER: ${CAPITAL_AUTONOMY_ONLY_PAPER:-true}
      MONITORING_LOOKBACK_HOURS: ${MONITORING_LOOKBACK_HOURS:-24}
      MONITORING_MIN_SCORED_TRADES: ${MONITORING_MIN_SCORED_TRADES:-6}
    security_opt:
      - no-new-privileges:true
    expose:
      - "8000"
    volumes:
      - antigravity_data:/app/data
      - antigravity_reports:/app/reports
      - antigravity_backups:/app/backups
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    stop_grace_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  antigravity_data:
  antigravity_reports:
  antigravity_backups:
